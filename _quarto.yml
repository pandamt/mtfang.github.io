project:
  type: website
  output-dir: docs

website:
  title: "Mengting Fang"
  favicon: images/baobao/Baobao_icon.png
  search: true
  page-footer:
    center: "© Mengting Fang <span id='year'></span>"
  navbar:
    left:
      - href: index.qmd
        text: About
      - href: publications.qmd
        text: Publications
      - href: talks.qmd
        text: Talks
      - href: projects.qmd
