format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    include-in-header:
      - text: |
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons/css/academicons.min.css">
          <script>document.addEventListener('DOMContentLoaded', function() { document.getElementById('year').textContent = new Date().getFullYear(); });</script>
    include-after-body:
      - text: |
          <button onclick="window.scrollTo({top:0, behavior:'smooth'})" 
            style="position:fixed; bottom:2rem; right:1.5rem; background:#6ab040; color:white; border:none; border-radius:50%; width:40px; height:40px; font-size:1.2rem; cursor:pointer; z-index:999;">
            ↑
          </button>